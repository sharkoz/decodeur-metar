<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Décodeur METAR</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #162033;
        background: #f6f8fb;
        --bg: #f6f8fb;
        --surface: #ffffff;
        --surface-strong: #f9fbff;
        --ink: #162033;
        --muted: #5c6980;
        --border: #dbe3ee;
        --accent: #1f6feb;
        --amber: #b7791f;
        --amber-soft: #fff7e8;
        --danger: #b42318;
        --danger-soft: #fff0ed;
        --success: #1f7a4c;
        --shadow: 0 18px 50px rgba(31, 55, 92, 0.09);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: linear-gradient(180deg, rgba(230, 237, 247, 0.95), rgba(246, 248, 251, 0) 420px), var(--bg);
      }
      button, input, textarea { font: inherit; }
      .app-shell { width: min(1180px, calc(100% - 40px)); margin: 0 auto; padding: 34px 0 56px; }
      .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; margin-bottom: 26px; }
      h1 { margin: 0; font-size: clamp(2rem, 4vw, 4.5rem); line-height: 0.98; letter-spacing: 0; color: var(--ink); }
      .topbar p { max-width: 660px; margin: 14px 0 0; color: var(--muted); font-size: 1.03rem; }
      .timezone-chip {
        flex: 0 0 auto; border: 1px solid var(--border); border-radius: 8px; background: var(--surface);
        color: #0f3f93; padding: 10px 12px; font-size: 0.88rem; font-weight: 700;
        box-shadow: 0 6px 18px rgba(31, 55, 92, 0.06);
      }
      .workspace {
        background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
        box-shadow: var(--shadow); padding: 22px;
      }
      .airport-search { display: grid; gap: 10px; margin-bottom: 18px; }
      label { color: var(--ink); display: block; font-size: 0.92rem; font-weight: 800; }
      .search-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; }
      .input-with-icon { position: relative; display: flex; align-items: center; }
      .search-icon { position: absolute; left: 13px; color: var(--muted); width: 18px; height: 18px; }
      input, textarea {
        width: 100%; border: 1px solid var(--border); border-radius: 8px; background: var(--surface-strong);
        color: var(--ink); outline: none; transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }
      input { min-height: 46px; padding: 0 14px 0 42px; }
      textarea {
        display: block; margin-top: 8px; min-height: 118px; resize: vertical; padding: 15px;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 0.98rem; line-height: 1.55;
      }
      input:focus, textarea:focus { border-color: rgba(31, 111, 235, 0.7); box-shadow: 0 0 0 4px rgba(31, 111, 235, 0.12); background: #fff; }
      .primary-button {
        border: 0; border-radius: 8px; min-height: 46px; padding: 0 18px; display: inline-flex; align-items: center;
        justify-content: center; gap: 9px; background: var(--accent); color: #fff; font-size: 0.94rem; font-weight: 800;
        cursor: pointer; transition: transform 150ms ease, background 150ms ease;
      }
      .primary-button:hover { background: #185ec7; }
      .primary-button:active { transform: translateY(1px); }
      .primary-button:disabled { opacity: 0.7; cursor: wait; }
      .status-line { margin: 0; display: flex; align-items: center; gap: 8px; min-height: 22px; color: var(--muted); font-size: 0.9rem; }
      .status-line.success { color: var(--success); }
      .status-line.error { color: var(--danger); }
      .summary-strip {
        margin-top: 18px; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
        border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: #fff;
      }
      .summary-strip div { display: grid; gap: 2px; padding: 13px 15px; border-right: 1px solid var(--border); }
      .summary-strip div:last-child { border-right: 0; }
      .summary-strip strong { color: var(--ink); font-size: 1rem; }
      .summary-strip span { color: var(--muted); font-size: 0.82rem; font-weight: 700; text-transform: uppercase; }
      .airport-info {
        margin-top: 14px; border: 1px solid var(--border); border-radius: 8px; background: #fbfdff;
        padding: 14px 15px; display: none; gap: 12px;
      }
      .airport-info.visible { display: grid; }
      .airport-info h3 { margin: 0; font-size: 1rem; color: var(--ink); }
      .airport-info-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
      .airport-info-item { display: grid; gap: 2px; min-width: 0; }
      .airport-info-item span { color: var(--muted); font-size: 0.74rem; font-weight: 900; text-transform: uppercase; }
      .airport-info-item strong { color: var(--ink); font-size: 0.93rem; overflow-wrap: anywhere; }
      .decode-section { margin-top: 30px; }
      .section-heading { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 14px; }
      h2 { margin: 0; color: var(--ink); font-size: clamp(1.35rem, 2vw, 2rem); letter-spacing: 0; }
      .normalized {
        margin: 0; max-width: 680px; color: var(--muted); font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.84rem; text-align: right; overflow-wrap: anywhere;
      }
      .table-frame { overflow: hidden; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); box-shadow: var(--shadow); }
      table { width: 100%; border-collapse: collapse; table-layout: fixed; }
      th { background: #eef4fb; color: #344258; padding: 13px 15px; text-align: left; font-size: 0.78rem; text-transform: uppercase; }
      th:first-child { width: 25%; }
      th:nth-child(2) { width: 34%; }
      td { padding: 15px; border-top: 1px solid var(--border); color: #26334a; vertical-align: top; }
      .warning-row td { background: var(--danger-soft); }
      .token-cell { display: grid; grid-template-columns: 34px minmax(0, 1fr); gap: 10px; align-items: start; }
      .category-icon {
        width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px;
        background: #edf5ff; color: var(--accent); font-size: 1.05rem;
      }
      code { display: block; color: var(--ink); font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 0.96rem; font-weight: 800; overflow-wrap: anywhere; }
      .token-cell span:last-child { display: block; margin-top: 2px; color: var(--muted); font-size: 0.82rem; font-weight: 700; }
      .pedagogy-cell { display: flex; align-items: center; gap: 14px; }
      .pedagogy-cell p { margin: 0; }
      .mini-compass { flex: 0 0 auto; width: 86px; display: grid; gap: 5px; justify-items: center; }
      .compass-face {
        --direction: 0deg; position: relative; width: 66px; height: 66px; border: 1px solid #b8c6d9; border-radius: 50%;
        background: linear-gradient(#fff, #fff) padding-box, conic-gradient(from -10deg, #f0f5fb, #dbe8f5, #f0f5fb) border-box;
        color: #40506a; font-size: 0.62rem; font-weight: 900;
      }
      .north,.east,.south,.west { position: absolute; }
      .north { top: 3px; left: 50%; transform: translateX(-50%); }
      .east { right: 5px; top: 50%; transform: translateY(-50%); }
      .south { bottom: 2px; left: 50%; transform: translateX(-50%); }
      .west { left: 5px; top: 50%; transform: translateY(-50%); }
      .needle {
        position: absolute; left: 50%; top: 50%; width: 3px; height: 25px; border-radius: 999px; background: var(--amber);
        transform-origin: 50% 100%; transform: translate(-50%, -100%) rotate(var(--direction));
      }
      .needle::before {
        content: ""; position: absolute; left: 50%; top: -5px; width: 9px; height: 9px; border-radius: 2px 8px 8px 8px;
        background: var(--amber); transform: translateX(-50%) rotate(45deg);
      }
      .compass-face strong { position: absolute; inset: 0; display: grid; place-items: center; color: var(--accent); font-size: 0.74rem; }
      .speed-chip { border-radius: 999px; background: var(--amber-soft); color: var(--amber); padding: 2px 8px; font-size: 0.72rem; font-weight: 900; }
      .empty-state {
        min-height: 180px; border: 1px dashed var(--border); border-radius: 8px; display: grid; place-items: center;
        color: var(--muted); background: rgba(255,255,255,0.7);
      }
      .spin { animation: spin 900ms linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (max-width: 760px) {
        .app-shell { width: min(100% - 28px, 1180px); padding-top: 22px; }
        .topbar, .section-heading { display: grid; }
        .timezone-chip { width: fit-content; }
        .workspace { padding: 16px; }
        .search-row, .summary-strip { grid-template-columns: 1fr; }
        .primary-button { width: 100%; }
        .summary-strip div { border-right: 0; border-bottom: 1px solid var(--border); }
        .summary-strip div:last-child { border-bottom: 0; }
        .airport-info-grid { grid-template-columns: 1fr 1fr; }
        .normalized { text-align: left; }
        .table-frame { border: 0; box-shadow: none; background: transparent; }
        table, thead, tbody, tr, th, td { display: block; }
        thead { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
        tr { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); margin-bottom: 12px; overflow: hidden; box-shadow: 0 10px 28px rgba(31,55,92,0.07); }
        td { border-top: 1px solid var(--border); display: grid; gap: 8px; padding: 14px; }
        td:first-child { border-top: 0; }
        td::before { content: attr(data-label); color: var(--muted); font-size: 0.72rem; font-weight: 900; text-transform: uppercase; }
        .pedagogy-cell { align-items: flex-start; }
      }
      @media (max-width: 460px) {
        h1 { font-size: 2.35rem; }
        .airport-info-grid { grid-template-columns: 1fr; }
        .pedagogy-cell { display: grid; }
        .mini-compass { width: 100%; justify-items: start; grid-template-columns: auto auto; align-items: center; }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Décodeur METAR</h1>
          <p>Transformez un message météo aéronautique en lecture française, avec conversions et repères visuels.</p>
        </div>
        <div class="timezone-chip" id="timezoneChip">UTC → fuseau local</div>
      </header>
      <section class="workspace">
        <form class="airport-search" id="searchForm">
          <label for="airportQuery">Rechercher un aérodrome ou code OACI</label>
          <div class="search-row">
            <div class="input-with-icon">
              <span class="search-icon">⌕</span>
              <input id="airportQuery" list="airportOptions" value="LFPG" placeholder="LFPG, Bordeaux, Paris..." autocomplete="off" />
              <datalist id="airportOptions"></datalist>
            </div>
            <button class="primary-button" id="fetchButton" type="submit">⌕ Récupérer</button>
          </div>
          <p class="status-line" id="statusLine">Collez un METAR ou récupérez une observation par code OACI.</p>
        </form>
        <label for="metarInput">Coller un METAR</label>
        <textarea id="metarInput" spellcheck="false" rows="4">METAR LFPG 251830Z 24012G22KT 200V280 9999 SCT035 BKN080 24/14 Q1016 NOSIG</textarea>
        <div class="summary-strip">
          <div><strong id="rowCount">0</strong><span>groupes lus</span></div>
          <div><strong id="warningCount">0</strong><span>à vérifier</span></div>
          <div><strong id="localTime">—</strong><span>heure locale</span></div>
        </div>
        <aside class="airport-info" id="airportInfo" aria-live="polite"></aside>
      </section>
      <section class="decode-section">
        <div class="section-heading">
          <h2>Décomposition pédagogique</h2>
          <p class="normalized" id="normalizedMetar"></p>
        </div>
        <div class="table-frame" id="tableFrame"></div>
      </section>
    </main>
    <script>
      const AIRPORTS_URL = "https://raw.githubusercontent.com/mwgg/Airports/master/airports.json";
      let airportsLoaded = false;
      let airportsLoadPromise = null;
      let airportsByIcao = new Map();
      let airportSearchIndex = [];
      const DESCRIPTORS = { BC:"bancs", BL:"chasse elevee", DR:"chasse basse", FZ:"se congelant", MI:"mince", PR:"partiel", SH:"averses", TS:"orage" };
      const PHENOMENA = { BR:"brume", DS:"tempete de poussiere", DU:"poussiere", DZ:"bruine", FC:"trombe ou tornade", FG:"brouillard", FU:"fumee", GR:"grele", GS:"gresil", HZ:"brume seche", IC:"cristaux de glace", PL:"granules de glace", RA:"pluie", SA:"sable", SG:"neige en grains", SN:"neige", SQ:"grain", SS:"tempete de sable", UP:"precipitation inconnue", VA:"cendres volcaniques" };
      const CLOUDS = { FEW:"quelques nuages", SCT:"nuages epars", BKN:"ciel fragmente", OVC:"ciel couvert", NSC:"aucun nuage significatif", NCD:"aucun nuage detecte", VV:"visibilite verticale" };
      const TRENDS = { BECMG:"evolution progressive attendue", NOSIG:"pas de changement significatif attendu", PROB30:"probabilite de 30 %", PROB40:"probabilite de 40 %", TEMPO:"phenomene temporaire attendu" };
      const CATEGORIES = { type:"Type", station:"Station", time:"Heure", wind:"Vent", visibility:"Visibilité", weather:"Temps", cloud:"Nuages", temperature:"Température", pressure:"Pression", trend:"Tendance", runway:"Piste", remark:"Remarque", unknown:"À vérifier" };
      const ICONS = { wind:"↗", visibility:"◉", cloud:"☁", pressure:"◌", station:"⌖", temperature:"℃", time:"◷" };
      const els = {
        timezoneChip: document.getElementById("timezoneChip"), form: document.getElementById("searchForm"), query: document.getElementById("airportQuery"),
        options: document.getElementById("airportOptions"), button: document.getElementById("fetchButton"), status: document.getElementById("statusLine"),
        input: document.getElementById("metarInput"), rowCount: document.getElementById("rowCount"), warningCount: document.getElementById("warningCount"),
        localTime: document.getElementById("localTime"), normalized: document.getElementById("normalizedMetar"), table: document.getElementById("tableFrame"),
        airportInfo: document.getElementById("airportInfo")
      };
      const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const initialIcao = getIcaoFromUrl();
      els.timezoneChip.textContent = "UTC → " + timeZone;
      if (initialIcao) els.query.value = initialIcao;
      loadAirportData().then(() => {
        updateAirportSuggestions(els.query.value);
        if (initialIcao) fetchAndRenderMetar();
      });
      els.query.addEventListener("input", () => updateAirportSuggestions(els.query.value));
      els.input.addEventListener("input", render);
      els.form.addEventListener("submit", async (event) => {
        event.preventDefault();
        await fetchAndRenderMetar();
      });
      async function fetchAndRenderMetar() {
        setStatus("loading", "Récupération du METAR en cours...");
        els.button.disabled = true;
        try {
          const result = await fetchMetar(els.query.value);
          els.input.value = result.raw;
          els.query.value = result.icao;
          updateUrlIcao(result.icao);
          updateAirportSuggestions(result.icao);
          renderAirportInfo(result.airport);
          setStatus("success", (result.airportLabel || result.icao) + " mis à jour depuis " + result.source + (result.airport ? " + airports.json" : "") + ".");
          render();
        } catch (error) {
          setStatus("error", error.message || "La récupération a échoué.");
        } finally {
          els.button.disabled = false;
        }
      }
      function getIcaoFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const value = (params.get("icao") || "").trim().toUpperCase();
        return /^[A-Z0-9]{4}$/.test(value) ? value : "";
      }
      function updateUrlIcao(icao) {
        const url = new URL(window.location.href);
        url.searchParams.set("icao", icao.toUpperCase());
        window.history.replaceState({}, "", url);
      }
      async function fetchMetar(query) {
        await ensureAirportData();
        const resolved = resolveIcao(query);
        if (!resolved) throw new Error("Saisissez un code OACI à 4 lettres ou un aérodrome connu de la liste.");
        const sources = [
          { source: "metar.vatsim.net", url: "https://metar.vatsim.net/" + encodeURIComponent(resolved.icao) },
          { source: "MET Norway tafmetar", url: "https://api.met.no/weatherapi/tafmetar/1.0/metar.txt?icao=" + encodeURIComponent(resolved.icao) }
        ];
        let lastError = null;
        for (const item of sources) {
          try {
            const response = await fetch(item.url, { headers: { Accept: "text/plain" } });
            if (!response.ok) throw new Error("HTTP " + response.status);
            const raw = latestTextMetar(await response.text(), resolved.icao);
            if (raw) return { ...resolved, raw, source: item.source, airport: getAirportInfo(resolved.icao) };
          } catch (error) {
            lastError = error;
          }
        }
        throw new Error("Impossible de récupérer le METAR. " + (lastError ? lastError.message : ""));
      }
      async function loadAirportData() {
        if (airportsLoadPromise) return airportsLoadPromise;
        airportsLoadPromise = fetch(AIRPORTS_URL, { headers: { Accept: "application/json" } })
          .then((response) => {
            if (!response.ok) throw new Error("HTTP " + response.status);
            return response.json();
          })
          .then((payload) => {
            const entries = Object.entries(payload || {});
            airportsByIcao = new Map();
            airportSearchIndex = entries
              .map(([key, value]) => normalizeAirportInfo(value, key))
              .filter(Boolean)
              .map((airport) => {
                airportsByIcao.set(airport.icao, airport);
                return {
                  airport,
                  search: normalizeSearch([airport.icao, airport.iata, airport.name, airport.city, airport.state, airport.country].filter(Boolean).join(" "))
                };
              });
            airportsLoaded = true;
            updateAirportSuggestions(els.query.value);
            return airportsByIcao;
          })
          .catch(() => {
            airportsLoaded = false;
            return airportsByIcao;
          });
        return airportsLoadPromise;
      }
      async function ensureAirportData() {
        if (!airportsLoaded) await loadAirportData();
      }
      function normalizeAirportInfo(data, fallbackIcao) {
        if (!data || typeof data !== "object") return null;
        const icao = String(data.icao || fallbackIcao || "").toUpperCase();
        if (!icao) return null;
        return {
          icao,
          iata: data.iata || "",
          name: data.name || "",
          city: data.city || "",
          state: data.state || "",
          country: data.country || "",
          altitudeFt: data.elevation,
          altitudeM: data.elevation !== undefined ? Number(data.elevation) * 0.3048 : undefined,
          lat: data.lat,
          lon: data.lon,
          timezone: data.tz || ""
        };
      }
      function getAirportInfo(icao) {
        return airportsByIcao.get(String(icao).toUpperCase()) || null;
      }
      function updateAirportSuggestions(query) {
        const normalized = normalizeSearch(query);
        const matches = airportSearchIndex
          .filter(({ airport, search }) => normalized ? search.includes(normalized) : airport.icao.startsWith("LF"))
          .sort((a, b) => scoreAirportMatch(a.airport, normalized) - scoreAirportMatch(b.airport, normalized))
          .slice(0, 60);
        els.options.innerHTML = matches.map(({ airport }) => '<option value="' + esc(airport.icao) + '">' + esc([airport.city, airport.name, airport.iata].filter(Boolean).join(" - ")) + '</option>').join("");
      }
      function scoreAirportMatch(airport, normalized) {
        if (!normalized) return airport.icao.startsWith("LF") ? 0 : 10;
        if (airport.icao === normalized) return 0;
        if (airport.iata && airport.iata === normalized) return 1;
        if (airport.icao.startsWith(normalized)) return 2;
        if (normalizeSearch(airport.city).startsWith(normalized)) return 3;
        if (normalizeSearch(airport.name).startsWith(normalized)) return 4;
        return 8;
      }
      function renderAirportInfo(info) {
        if (!info) {
          els.airportInfo.classList.remove("visible");
          els.airportInfo.innerHTML = "";
          return;
        }
        const altitude = info.altitudeFt !== undefined || info.altitudeM !== undefined
          ? fmt(Number(info.altitudeFt), 0) + " ft / " + fmt(Number(info.altitudeM), 0) + " m"
          : "—";
        const coordinates = info.lat !== undefined && info.lon !== undefined
          ? Number(info.lat).toFixed(4) + ", " + Number(info.lon).toFixed(4)
          : "—";
        const place = [info.city, info.state].filter(Boolean).join(", ") || "—";
        const items = [
          ["OACI", info.icao], ["IATA", info.iata || "—"], ["Lieu", place], ["Pays", info.country || "—"],
          ["Altitude", altitude], ["Latitude", info.lat !== undefined ? Number(info.lat).toFixed(5) : "—"],
          ["Longitude", info.lon !== undefined ? Number(info.lon).toFixed(5) : "—"], ["Fuseau", info.timezone || "—"]
        ];
        els.airportInfo.innerHTML = '<h3>' + esc(info.name || info.icao) + '</h3><div class="airport-info-grid">' + items.map(([label, value]) => '<div class="airport-info-item"><span>' + esc(label) + '</span><strong>' + esc(value) + '</strong></div>').join("") + '</div>';
        els.airportInfo.classList.add("visible");
      }
      function resolveIcao(query) {
        const trimmed = query.trim();
        if (/^[A-Za-z]{4}$/.test(trimmed)) {
          const icao = trimmed.toUpperCase();
          const airport = getAirportInfo(icao);
          return { icao, airportLabel: airport ? airport.name + " (" + airport.icao + ")" : undefined };
        }
        const normalized = normalizeSearch(trimmed);
        const match = airportSearchIndex
          .filter(({ search }) => search.includes(normalized))
          .sort((a, b) => scoreAirportMatch(a.airport, normalized) - scoreAirportMatch(b.airport, normalized))[0];
        return match ? { icao: match.airport.icao, airportLabel: match.airport.name + " (" + match.airport.icao + ")" } : null;
      }
      function normalizeSearch(value) { return value.normalize("NFD").replace(/\p{Diacritic}/gu, "").trim().toUpperCase(); }
      function latestTextMetar(payload, icao) {
        const stationPattern = new RegExp("^(METAR\\s+|SPECI\\s+)?" + icao + "\\b");
        return payload.split(/\r?\n/).map(cleanRaw).filter(Boolean).reverse().find((line) => stationPattern.test(line));
      }
      function cleanRaw(value) { return value ? value.trim().replace(/=$/, "") : ""; }
      function setStatus(kind, message) {
        els.status.className = "status-line " + (kind === "loading" ? "" : kind);
        els.status.textContent = (kind === "loading" ? "◌ " : kind === "success" ? "✓ " : kind === "error" ? "⚠ " : "") + message;
      }
      function render() {
        const parsed = parseMetar(els.input.value);
        els.rowCount.textContent = parsed.rows.length;
        els.warningCount.textContent = parsed.warnings.length;
        els.localTime.textContent = parsed.summary.observedAtLocal || "—";
        els.normalized.textContent = parsed.normalized || "Aucun METAR à décoder pour le moment.";
        els.table.innerHTML = parsed.rows.length ? tableHtml(parsed.rows) : '<div class="empty-state"><p>Collez un METAR pour voir apparaître la lecture groupe par groupe.</p></div>';
      }
      function parseMetar(rawInput) {
        const normalized = rawInput.replace(/\s+/g, " ").trim().toUpperCase();
        const tokens = normalized ? normalized.split(" ") : [];
        const rows = [], warnings = [], summary = {};
        let inRemarks = false;
        tokens.forEach((token, index) => {
          let row;
          const nextToken = tokens[index + 1];
          if (inRemarks) row = makeRow(index, token, "remark", "Élément de remarque.", "Après RMK, les groupes sont gardés tels quels pour ne pas sur-interpréter.");
          else if (token === "RMK") { inRemarks = true; row = makeRow(index, token, "remark", "Début des remarques.", "Les groupes suivants sont des remarques locales ou nationales."); }
          else if (token === "METAR" || token === "SPECI") row = makeRow(index, token, "type", token === "METAR" ? "Observation météorologique régulière d'aérodrome." : "Observation spéciale d'aérodrome.", "Le message décrit les conditions observées à un instant précis.");
          else if (!summary.station && /^[A-Z]{4}$/.test(token)) { summary.station = token; row = makeRow(index, token, "station", "Station OACI " + token + ".", "Identifiant de l'aérodrome sur quatre lettres."); }
          else if (/^\d{6}Z$/.test(token)) { row = decodeTime(index, token); summary.observedAtLocal = row.local; }
          else if (/^(\d{3}|VRB)\d{2,3}(G\d{2,3})?(KT|MPS|KMH)$/.test(token)) row = decodeWind(index, token, nextToken);
          else if (/^\d{3}V\d{3}$/.test(token)) row = makeRow(index, token, "wind", "Direction du vent variable de " + token.slice(0,3) + "° à " + token.slice(4,7) + "°.", "Ce groupe complète le vent moyen et indique un secteur de variation.");
          else if (token === "CAVOK") row = makeRow(index, token, "visibility", "Ceiling And Visibility OK.", "Visibilité au moins 10 km, pas de nuage significatif bas, pas de temps significatif.");
          else if (/^\d{4}(NDV)?$/.test(token)) row = decodeVisibility(index, token);
          else if (/^R\d{2}[LCR]?\/[MP]?\d{4}(V[MP]?\d{4})?[UDN]?$/.test(token)) row = makeRow(index, token, "runway", "Portée visuelle de piste " + token + ".", "La RVR donne la distance visible le long de la piste.");
          else if (isWeather(token)) row = decodeWeather(index, token);
          else if (/^(FEW|SCT|BKN|OVC|NSC|NCD|VV)(\d{3}|\/\/\/)?(CB|TCU)?$/.test(token)) row = decodeCloud(index, token);
          else if (/^(M?\d{2})\/(M?\d{2}|\/\/)$/.test(token)) row = decodeTemperature(index, token);
          else if (/^Q\d{4}$/.test(token) || /^A\d{4}$/.test(token)) row = decodePressure(index, token);
          else if (TRENDS[token]) row = makeRow(index, token, "trend", TRENDS[token], "Indique une tendance prévue dans les deux heures suivant l'observation.");
          else if (/^(AUTO|COR)$/.test(token)) row = makeRow(index, token, "type", token === "AUTO" ? "Observation automatique." : "Message corrigé.", token === "AUTO" ? "Le message est produit automatiquement." : "Cette version corrige une observation transmise précédemment.");
          if (!row) { warnings.push("Groupe non reconnu: " + token); row = makeRow(index, token, "unknown", "Groupe non reconnu par ce décodeur.", "Conservé tel quel: certains pays ajoutent des groupes locaux."); row.warning = "Non reconnu"; }
          rows.push(row);
        });
        return { normalized, rows, warnings, summary };
      }
      function decodeTime(index, token) {
        const date = decodedTimeToDate(token);
        const local = new Intl.DateTimeFormat("fr-FR", { timeZone, weekday:"short", day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit", timeZoneName:"short" }).format(date);
        const row = makeRow(index, token, "time", "Observation le " + token.slice(0,2) + " à " + token.slice(2,4) + "h" + token.slice(4,6) + " UTC.", "Heure locale: " + local + ". Le Z signifie Zulu, donc UTC.");
        row.local = local;
        return row;
      }
      function decodedTimeToDate(token) {
        const now = new Date(), day = Number(token.slice(0,2));
        return new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), day, Number(token.slice(2,4)), Number(token.slice(4,6))));
      }
      function decodeWind(index, token, nextToken) {
        const m = token.match(/^(\d{3}|VRB)(\d{2,3})(G(\d{2,3}))?(KT|MPS|KMH)$/);
        const direction = m[1], speed = Number(m[2]), gust = m[4] ? Number(m[4]) : null, unit = m[5];
        const kt = unit === "KT" ? speed : unit === "KMH" ? speed / 1.852 : speed / 0.514444;
        const dirText = direction === "VRB" ? "variable" : direction + "° (" + cardinal(Number(direction)) + ")";
        const literal = direction === "000" && speed === 0 ? "Vent calme." : "Vent du " + dirText + " à " + speed + " " + unit + (gust ? " avec rafales à " + gust + " " + unit : "") + ".";
        const row = makeRow(index, token, "wind", literal, "Le vent vient de cette direction, il ne va pas vers elle. " + fmt(kt,0) + " kt = " + fmt(kt*1.852,0) + " km/h = " + fmt(kt*0.514444,1) + " m/s.");
        row.visual = { directionDeg: direction === "VRB" ? null : Number(direction), speedKt: kt };
        if (nextToken && /^\d{3}V\d{3}$/.test(nextToken)) row.pedagogical += " Direction variable entre " + nextToken.slice(0,3) + "° et " + nextToken.slice(4,7) + "°.";
        return row;
      }
      function decodeVisibility(index, token) {
        const meters = Number(token.slice(0,4));
        return makeRow(index, token, "visibility", "Visibilité dominante " + (meters === 9999 ? "10 km ou plus" : meters + " m") + ".", "En unité SI lisible: " + (meters === 9999 ? "10 km ou plus" : meters >= 1000 ? fmt(meters/1000,1) + " km" : meters + " m") + ". 9999 signifie au moins 10 km.");
      }
      function decodeWeather(index, token) {
        const intensity = token.startsWith("-") ? "faible " : token.startsWith("+") ? "forte " : token.startsWith("VC") ? "à proximité " : "";
        const body = token.replace(/^[-+]/, "").replace(/^VC/, "");
        const parts = body.match(/.{1,2}/g) || [];
        return makeRow(index, token, "weather", "Temps présent: " + intensity + parts.map(p => DESCRIPTORS[p] || PHENOMENA[p] || p).join(" ") + ".", "Les signes - et + indiquent l'intensité; VC signifie au voisinage.");
      }
      function decodeCloud(index, token) {
        const m = token.match(/^(FEW|SCT|BKN|OVC|NSC|NCD|VV)(\d{3}|\/\/\/)?(CB|TCU)?$/);
        const cover = CLOUDS[m[1]] || m[1], height = m[2], type = m[3] ? " avec " + m[3] : "";
        if (!height || height === "///") return makeRow(index, token, "cloud", cover + ".", "Aucune hauteur exploitable n'est fournie pour ce groupe.");
        const feet = Number(height) * 100;
        return makeRow(index, token, "cloud", cover + " à " + fmt(feet,0) + " ft" + type + ".", fmt(feet,0) + " ft = " + fmt(feet*0.3048,0) + " m.");
      }
      function decodeTemperature(index, token) {
        const [rawTemp, rawDew] = token.split("/");
        const t = signed(rawTemp), d = rawDew === "//" ? null : signed(rawDew);
        return makeRow(index, token, "temperature", "Température " + t + " °C, point de rosée " + (d === null ? "non renseigné" : d + " °C") + ".", d === null ? "La température est déjà en unité SI." : "Écart température-point de rosée: " + (t - d) + " °C.");
      }
      function decodePressure(index, token) {
        if (token.startsWith("Q")) {
          const hpa = Number(token.slice(1));
          return makeRow(index, token, "pressure", "QNH " + hpa + " hPa.", hpa + " hPa = " + fmt(hpa*100,0) + " Pa en unité SI.");
        }
        const inches = Number(token.slice(1,3) + "." + token.slice(3)), hpa = inches * 33.8639;
        return makeRow(index, token, "pressure", "Altimeter " + fmt(inches,2) + " inHg.", "Équivalent QNH: " + fmt(hpa,0) + " hPa.");
      }
      function isWeather(token) {
        const body = token.replace(/^[-+]/, "").replace(/^VC/, "");
        const parts = body.match(/.{1,2}/g) || [];
        return body.length % 2 === 0 && parts.some(p => PHENOMENA[p]) && parts.every(p => PHENOMENA[p] || DESCRIPTORS[p]);
      }
      function signed(value) { return value.startsWith("M") ? -Number(value.slice(1)) : Number(value); }
      function cardinal(deg) { return ["N","NE","E","SE","S","SO","O","NO"][Math.round(((deg % 360) / 45)) % 8]; }
      function fmt(value, digits) { return new Intl.NumberFormat("fr-FR", { maximumFractionDigits: digits }).format(value); }
      function makeRow(index, token, category, literal, pedagogical) { return { id: index + "-" + token, token, category, literal, pedagogical }; }
      function tableHtml(rows) {
        return '<table><thead><tr><th>Groupe</th><th>Lecture littérale</th><th>Explication pédagogique</th></tr></thead><tbody>' + rows.map(rowHtml).join("") + "</tbody></table>";
      }
      function rowHtml(row) {
        return '<tr class="' + (row.warning ? "warning-row" : "") + '"><td data-label="Groupe"><div class="token-cell"><span class="category-icon">' + (ICONS[row.category] || "◌") + '</span><div><code>' + esc(row.token) + '</code><span>' + CATEGORIES[row.category] + '</span></div></div></td><td data-label="Lecture littérale">' + esc(row.literal) + '</td><td data-label="Explication pédagogique"><div class="pedagogy-cell">' + compassHtml(row.visual) + '<p>' + esc(row.pedagogical) + '</p></div></td></tr>';
      }
      function compassHtml(visual) {
        if (!visual) return "";
        if (visual.directionDeg === null) return '<div class="mini-compass"><div class="compass-face"><span class="north">N</span><span class="east">E</span><span class="south">S</span><span class="west">O</span><strong>VRB</strong></div><span class="speed-chip">variable</span></div>';
        return '<div class="mini-compass"><div class="compass-face" style="--direction:' + visual.directionDeg + 'deg"><span class="north">N</span><span class="east">E</span><span class="south">S</span><span class="west">O</span><span class="needle"></span></div><span class="speed-chip">' + Math.round(visual.speedKt) + ' kt</span></div>';
      }
      function esc(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[char]));
      }
      render();
    </script>
  </body>
</html>
