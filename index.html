<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Décodeur METAR</title>
    <meta name="description" content="Décode un message météo aéronautique (METAR) en lecture française pédagogique." />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1f6feb" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="METAR" />
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #162033;
        background: #f6f8fb;
        --bg: #f6f8fb;
        --surface: #ffffff;
        --surface-strong: #f9fbff;
        --ink: #162033;
        --muted: #5c6980;
        --border: #dbe3ee;
        --accent: #1f6feb;
        --amber: #b7791f;
        --amber-soft: #fff7e8;
        --danger: #b42318;
        --danger-soft: #fff0ed;
        --success: #1f7a4c;
        --shadow: 0 18px 50px rgba(31, 55, 92, 0.09);
        --page-gradient-start: rgba(230, 237, 247, 0.95);
        --page-gradient-end: rgba(246, 248, 251, 0);
        --chip-ink: #0f3f93;
        --input-focus-bg: #ffffff;
        --table-head-bg: #eef4fb;
        --table-head-ink: #344258;
        --cell-ink: #26334a;
        --icon-bg: #edf5ff;
        --airport-info-bg: #fbfdff;
        --compass-border: #b8c6d9;
        --compass-bg: linear-gradient(#fff, #fff) padding-box, conic-gradient(from -10deg, #f0f5fb, #dbe8f5, #f0f5fb) border-box;
        --compass-ink: #40506a;
        --target-bg: rgba(31, 111, 235, 0.08);
        --favorite-bg: #fff7d6;
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
        color: #e7edf8;
        background: #101722;
        --bg: #101722;
        --surface: #172131;
        --surface-strong: #111a27;
        --ink: #e7edf8;
        --muted: #a3afc2;
        --border: #2b3a50;
        --accent: #6aa4ff;
        --amber: #f2b84b;
        --amber-soft: rgba(242, 184, 75, 0.14);
        --danger: #ff8a7c;
        --danger-soft: rgba(180, 35, 24, 0.18);
        --success: #71d49c;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
        --page-gradient-start: rgba(32, 47, 70, 0.92);
        --page-gradient-end: rgba(16, 23, 34, 0);
        --chip-ink: #c7dcff;
        --input-focus-bg: #101827;
        --table-head-bg: #202d40;
        --table-head-ink: #d5e1f1;
        --cell-ink: #d7dfec;
        --icon-bg: #203653;
        --airport-info-bg: #121c2a;
        --compass-border: #50647f;
        --compass-bg: linear-gradient(#152132, #152132) padding-box, conic-gradient(from -10deg, #26384f, #172539, #26384f) border-box;
        --compass-ink: #cad7e8;
        --target-bg: rgba(106, 164, 255, 0.14);
        --favorite-bg: rgba(242, 184, 75, 0.16);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        background: linear-gradient(180deg, var(--page-gradient-start), var(--page-gradient-end) 420px), var(--bg);
      }
      button, input, textarea { font: inherit; }
      .app-shell { width: min(1180px, calc(100% - 40px)); margin: 0 auto; padding: 34px 0 56px; }
      .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; margin-bottom: 26px; }
      h1 { margin: 0; font-size: clamp(2rem, 4vw, 4.5rem); line-height: 0.98; letter-spacing: 0; color: var(--ink); }
      .topbar p { max-width: 660px; margin: 14px 0 0; color: var(--muted); font-size: 1.03rem; }
      .topbar-actions { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; }
      .timezone-chip, .theme-toggle {
        border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--chip-ink);
        padding: 10px 12px; font-size: 0.88rem; font-weight: 700; box-shadow: 0 6px 18px rgba(31, 55, 92, 0.06);
      }
      .theme-toggle { cursor: pointer; display: inline-flex; align-items: center; gap: 8px; min-height: 40px; }
      .theme-toggle:hover { border-color: var(--accent); }
      .workspace {
        background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
        box-shadow: var(--shadow); padding: 22px;
      }
      .airport-search { display: grid; gap: 10px; margin-bottom: 18px; }
      .favorites-bar { display: none; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 4px; }
      .favorites-bar.visible { display: flex; }
      .favorites-label { color: var(--muted); font-size: 0.78rem; font-weight: 900; text-transform: uppercase; }
      .favorite-chip {
        border: 1px solid var(--border); border-radius: 8px; background: var(--favorite-bg); color: var(--ink);
        padding: 6px 9px; font-size: 0.82rem; font-weight: 900; cursor: pointer;
      }
      .favorite-chip:hover, .favorite-chip:focus-visible { border-color: var(--amber); color: var(--amber); outline: none; }
      label { color: var(--ink); display: block; font-size: 0.92rem; font-weight: 800; }
      .search-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; }
      .input-with-icon { position: relative; display: flex; align-items: center; }
      .search-icon { position: absolute; left: 13px; color: var(--muted); width: 18px; height: 18px; }
      .favorite-toggle {
        position: absolute; right: 8px; width: 34px; height: 34px; border: 0; border-radius: 8px;
        background: transparent; color: var(--muted); cursor: pointer; font-size: 1.08rem; display: grid; place-items: center;
      }
      .favorite-toggle:hover, .favorite-toggle:focus-visible { background: var(--favorite-bg); color: var(--amber); outline: none; }
      .favorite-toggle.active { color: var(--amber); }
      .geoloc-toggle {
        position: absolute; right: 44px; width: 34px; height: 34px; border: 0; border-radius: 8px;
        background: transparent; color: var(--muted); cursor: pointer; display: grid; place-items: center;
      }
      .geoloc-toggle:hover, .geoloc-toggle:focus-visible { background: var(--icon-bg); color: var(--accent); outline: none; }
      .geoloc-toggle:disabled { cursor: wait; }
      .geoloc-toggle.loading { color: var(--accent); }
      .geoloc-toggle svg { width: 18px; height: 18px; }
      .geoloc-toggle.loading svg { animation: spin 900ms linear infinite; }
      .geo-suggestions {
        display: none; flex-direction: column; gap: 3px; border: 1px solid var(--border); border-radius: 8px;
        background: var(--surface); padding: 8px; box-shadow: 0 10px 28px rgba(31, 55, 92, 0.06);
      }
      .geo-suggestions.visible { display: flex; }
      .geo-suggestions-head { color: var(--muted); font-size: 0.74rem; font-weight: 900; text-transform: uppercase; padding: 2px 6px 6px; }
      .geo-item {
        display: flex; align-items: center; justify-content: space-between; gap: 12px; width: 100%;
        border: 1px solid transparent; border-radius: 8px; background: transparent; color: var(--ink);
        padding: 8px 10px; text-align: left; cursor: pointer;
      }
      .geo-item:hover:not(:disabled), .geo-item:focus-visible:not(:disabled), .geo-item.active:not(:disabled) { border-color: var(--accent); background: var(--surface-strong); outline: none; }
      .geo-item-main { font-size: 0.9rem; overflow-wrap: anywhere; }
      .geo-item-main strong { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; color: var(--accent); }
      .geo-iata {
        margin-left: 4px; border-radius: 999px; background: var(--icon-bg); color: var(--chip-ink);
        padding: 1px 7px; font-size: 0.68rem; font-weight: 900;
      }
      .geo-item-meta { display: flex; align-items: center; gap: 12px; flex: 0 0 auto; }
      .geo-dist { color: var(--muted); font-size: 0.8rem; font-weight: 700; white-space: nowrap; }
      .geo-state { font-size: 0.74rem; font-weight: 900; min-width: 58px; text-align: right; white-space: nowrap; }
      .geo-item.testing { opacity: 0.85; }
      .geo-item.testing .geo-state { color: var(--muted); }
      .geo-item.available { border-color: rgba(31, 122, 76, 0.45); }
      .geo-item.available .geo-state { color: var(--success); }
      .geo-item.unavailable { opacity: 0.42; cursor: not-allowed; }
      .geo-item.unavailable .geo-state { color: var(--muted); }
      input, textarea {
        width: 100%; border: 1px solid var(--border); border-radius: 8px; background: var(--surface-strong);
        color: var(--ink); outline: none; transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }
      input { min-height: 46px; padding: 0 84px 0 42px; }
      textarea {
        display: block; margin-top: 8px; min-height: 118px; resize: vertical; padding: 15px;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 0.98rem; line-height: 1.55;
      }
      input:focus, textarea:focus { border-color: rgba(31, 111, 235, 0.7); box-shadow: 0 0 0 4px rgba(31, 111, 235, 0.12); background: var(--input-focus-bg); }
      .primary-button {
        border: 0; border-radius: 8px; min-height: 46px; padding: 0 18px; display: inline-flex; align-items: center;
        justify-content: center; gap: 9px; background: var(--accent); color: #fff; font-size: 0.94rem; font-weight: 800;
        cursor: pointer; transition: transform 150ms ease, background 150ms ease;
      }
      .primary-button:hover { background: #185ec7; }
      .primary-button:active { transform: translateY(1px); }
      .primary-button:disabled { opacity: 0.7; cursor: wait; }
      .status-line { margin: 0; display: flex; align-items: center; gap: 8px; min-height: 22px; color: var(--muted); font-size: 0.9rem; }
      .status-line.success { color: var(--success); }
      .status-line.error { color: var(--danger); }
      .summary-strip {
        margin-top: 18px; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
        border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--surface);
      }
      .summary-strip div { display: grid; gap: 2px; padding: 13px 15px; border-right: 1px solid var(--border); }
      .summary-strip div:last-child { border-right: 0; }
      .summary-strip strong { color: var(--ink); font-size: 1rem; }
      .summary-strip span { color: var(--muted); font-size: 0.82rem; font-weight: 700; text-transform: uppercase; }
      .airport-info {
        margin-top: 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--airport-info-bg);
        padding: 14px 15px; display: none; gap: 12px;
      }
      .airport-info.visible { display: grid; }
      .airport-info h3 { margin: 0; font-size: 1rem; color: var(--ink); }
      .airport-info-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
      .airport-info-item { display: grid; gap: 2px; min-width: 0; }
      .airport-info-item span { color: var(--muted); font-size: 0.74rem; font-weight: 900; text-transform: uppercase; }
      .airport-info-item strong { color: var(--ink); font-size: 0.93rem; overflow-wrap: anywhere; }
      .airport-info-action { display: flex; justify-content: flex-end; }
      .airport-favorite-link {
        border: 0; background: transparent; color: var(--accent); font-size: 0.9rem; font-weight: 800;
        padding: 0; cursor: pointer;
      }
      .airport-favorite-link:hover, .airport-favorite-link:focus-visible { color: var(--amber); outline: none; }
      .decode-section { margin-top: 30px; }
      .section-heading { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 14px; }
      h2 { margin: 0; color: var(--ink); font-size: clamp(1.35rem, 2vw, 2rem); letter-spacing: 0; }
      .normalized {
        margin: 0; max-width: 680px; color: var(--muted); font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.84rem; text-align: right; overflow-wrap: anywhere;
      }
      .report-blocks {
        display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 14px;
      }
      .report-token {
        border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--ink);
        padding: 8px 10px; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 0.84rem;
        font-weight: 800; cursor: pointer; box-shadow: 0 6px 16px rgba(31, 55, 92, 0.05);
      }
      .report-token:hover, .report-token:focus-visible { border-color: var(--accent); color: var(--accent); outline: none; }
      tr.target-row td { background: var(--target-bg); }
      .detail-target { scroll-margin-top: 22px; }
      .table-frame { overflow: hidden; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); box-shadow: var(--shadow); }
      table { width: 100%; border-collapse: collapse; table-layout: fixed; }
      th { background: var(--table-head-bg); color: var(--table-head-ink); padding: 13px 15px; text-align: left; font-size: 0.78rem; text-transform: uppercase; }
      th:first-child { width: 25%; }
      th:nth-child(2) { width: 34%; }
      td { padding: 15px; border-top: 1px solid var(--border); color: var(--cell-ink); vertical-align: top; }
      .warning-row td { background: var(--danger-soft); }
      .token-cell { display: grid; grid-template-columns: 34px minmax(0, 1fr); gap: 10px; align-items: start; }
      .category-icon {
        width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px;
        background: var(--icon-bg); color: var(--accent); font-size: 1.05rem;
      }
      code { display: block; color: var(--ink); font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 0.96rem; font-weight: 800; overflow-wrap: anywhere; }
      .token-cell span:last-child { display: block; margin-top: 2px; color: var(--muted); font-size: 0.82rem; font-weight: 700; }
      .pedagogy-cell { display: flex; align-items: flex-start; gap: 14px; }
      .pedagogy-cell p { margin: 0; }
      .pedagogy-text { min-width: 0; flex: 1; }
      .learn { margin-top: 10px; }
      .learn > summary {
        cursor: pointer; list-style: none; display: inline-flex; align-items: center; gap: 6px;
        font-size: 0.78rem; font-weight: 800; color: var(--accent); padding: 3px 0; user-select: none;
      }
      .learn > summary::-webkit-details-marker { display: none; }
      .learn > summary::after { content: "▸"; transition: transform 150ms ease; }
      .learn[open] > summary::after { transform: rotate(90deg); }
      .learn > summary:hover { text-decoration: underline; }
      .learn-body { margin-top: 8px; display: grid; gap: 3px; border-left: 2px solid var(--border); padding-left: 12px; }
      .learn-section { font-size: 0.68rem; font-weight: 900; text-transform: uppercase; color: var(--muted); margin-top: 8px; letter-spacing: 0.02em; }
      .learn-section:first-child { margin-top: 0; }
      .learn-item { display: grid; grid-template-columns: 56px minmax(0, 1fr); gap: 10px; align-items: baseline; padding: 4px 7px; border-radius: 6px; }
      .learn-item code { display: inline; font-size: 0.82rem; font-weight: 800; color: var(--muted); }
      .learn-item strong { font-size: 0.84rem; color: var(--ink); font-weight: 800; }
      .learn-item span { display: block; margin-top: 1px; font-size: 0.8rem; color: var(--muted); font-weight: 600; }
      .learn-item.active { background: var(--target-bg); }
      .learn-item.active code, .learn-item.active strong { color: var(--accent); }
      .mini-compass { flex: 0 0 auto; width: 100px; display: grid; gap: 6px; justify-items: center; }
      .compass-face {
        position: relative; width: 66px; height: 66px; margin: 16px; border: 1px solid var(--compass-border); border-radius: 50%;
        background: var(--compass-bg);
        color: var(--compass-ink); font-size: 0.68rem; font-weight: 900;
      }
      .north,.east,.south,.west { position: absolute; color: var(--compass-ink); }
      .north { top: -15px; left: 50%; transform: translateX(-50%); }
      .east { right: -14px; top: 50%; transform: translateY(-50%); }
      .south { bottom: -15px; left: 50%; transform: translateX(-50%); }
      .west { left: -14px; top: 50%; transform: translateY(-50%); }
      .wind-barb { position: absolute; inset: 0; width: 100%; height: 100%; color: var(--amber); overflow: visible; }
      .wind-arc { position: absolute; inset: 0; width: 100%; height: 100%; color: var(--accent); }
      .compass-face strong { position: absolute; inset: 0; display: grid; place-items: center; color: var(--accent); font-size: 0.74rem; }
      .dir-arrow { display: inline-block; color: var(--accent); font-weight: 900; transform: rotate(var(--bearing, 0deg)); }
      .geo-dist .dir-arrow { color: var(--accent); }
      .coord-link { color: var(--accent); font-weight: 800; text-decoration: none; overflow-wrap: anywhere; }
      .coord-link:hover, .coord-link:focus-visible { text-decoration: underline; outline: none; }
      .speed-chip { border-radius: 999px; background: var(--amber-soft); color: var(--amber); padding: 2px 8px; font-size: 0.72rem; font-weight: 900; }
      .empty-state {
        min-height: 180px; border: 1px dashed var(--border); border-radius: 8px; display: grid; place-items: center;
        color: var(--muted); background: rgba(255,255,255,0.7);
      }
      .spin { animation: spin 900ms linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (max-width: 760px) {
        .app-shell { width: min(100% - 28px, 1180px); padding-top: 22px; }
        .topbar, .section-heading { display: grid; }
        .topbar-actions { flex-wrap: wrap; }
        .timezone-chip { width: fit-content; }
        .workspace { padding: 16px; }
        .search-row, .summary-strip { grid-template-columns: 1fr; }
        .primary-button { width: 100%; }
        .summary-strip div { border-right: 0; border-bottom: 1px solid var(--border); }
        .summary-strip div:last-child { border-bottom: 0; }
        .airport-info-grid { grid-template-columns: 1fr 1fr; }
        .normalized { text-align: left; }
        .report-blocks { gap: 7px; }
        .report-token { font-size: 0.8rem; padding: 7px 9px; }
        .airport-info-action { justify-content: flex-start; }
        .table-frame { border: 0; box-shadow: none; background: transparent; }
        table, thead, tbody, tr, th, td { display: block; }
        thead { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
        tr { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); margin-bottom: 12px; overflow: hidden; box-shadow: 0 10px 28px rgba(31,55,92,0.07); }
        td { border-top: 1px solid var(--border); display: grid; gap: 8px; padding: 14px; }
        td:first-child { border-top: 0; }
        td::before { content: attr(data-label); color: var(--muted); font-size: 0.72rem; font-weight: 900; text-transform: uppercase; }
        .pedagogy-cell { align-items: flex-start; }
      }
      @media (max-width: 460px) {
        h1 { font-size: 2.35rem; }
        .airport-info-grid { grid-template-columns: 1fr; }
        .pedagogy-cell { display: grid; }
        .mini-compass { width: 100%; justify-items: start; grid-template-columns: auto auto; align-items: center; }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Décodeur METAR</h1>
          <p>Transformez un message météo aéronautique en lecture française, avec conversions et repères visuels.</p>
        </div>
        <div class="topbar-actions">
          <div class="timezone-chip" id="timezoneChip">UTC → fuseau local</div>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="Basculer le mode sombre">☾ Mode sombre</button>
        </div>
      </header>
      <section class="workspace">
        <form class="airport-search" id="searchForm">
          <div class="favorites-bar" id="favoritesBar" aria-label="Aérodromes favoris"></div>
          <label for="airportQuery">Rechercher un aérodrome ou code OACI</label>
          <div class="search-row">
            <div class="input-with-icon">
              <span class="search-icon">⌕</span>
              <input id="airportQuery" placeholder="LFPG, Bordeaux, Paris..." autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list" aria-controls="geoSuggestions" />
              <button class="geoloc-toggle" id="geolocToggle" type="button" aria-label="Me localiser" title="Trouver l'aérodrome le plus proche"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3.2"></circle><path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path><circle cx="12" cy="12" r="8.2"></circle></svg></button>
              <button class="favorite-toggle" id="favoriteToggle" type="button" aria-label="Ajouter aux favoris" title="Ajouter aux favoris">☆</button>
            </div>
            <button class="primary-button" id="fetchButton" type="submit">⌕ Récupérer</button>
          </div>
          <div class="geo-suggestions" id="geoSuggestions" aria-label="Aérodromes les plus proches"></div>
          <p class="status-line" id="statusLine">Collez un METAR ou récupérez une observation par code OACI.</p>
        </form>
        <label for="metarInput">Coller un METAR</label>
        <textarea id="metarInput" spellcheck="false" rows="4">METAR LFPG 251830Z 24012G22KT 200V280 9999 SCT035 BKN080 24/14 Q1016 NOSIG</textarea>
        <div class="summary-strip">
          <div><strong id="rowCount">0</strong><span>groupes lus</span></div>
          <div><strong id="warningCount">0</strong><span>à vérifier</span></div>
          <div><strong id="localTime">—</strong><span>heure locale</span></div>
        </div>
        <aside class="airport-info" id="airportInfo" aria-live="polite"></aside>
      </section>
      <section class="decode-section">
        <div class="section-heading">
          <h2>Décomposition pédagogique</h2>
          <p class="normalized" id="normalizedMetar"></p>
        </div>
        <div class="report-blocks" id="reportBlocks" aria-label="Groupes du METAR cliquables"></div>
        <div class="table-frame" id="tableFrame"></div>
      </section>
    </main>
    <script>

      function nearestAirports(lat, lon, count) {
        return airportSearchIndex

      function distanceKm(lat1, lon1, lat2, lon2) {
        const toRad = (deg) => (deg * Math.PI) / 180;
        const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
        const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
        return 2 * 6371 * Math.asin(Math.sqrt(a));
      }
      function bearingDeg(lat1, lon1, lat2, lon2) {
        const toRad = (deg) => (deg * Math.PI) / 180;
        const p1 = toRad(lat1), p2 = toRad(lat2), dLon = toRad(lon2 - lon1);
        const y = Math.sin(dLon) * Math.cos(p2);
        const x = Math.cos(p1) * Math.sin(p2) - Math.sin(p1) * Math.cos(p2) * Math.cos(dLon);
        return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
      }
      function bearingFromUser(airport) {

      function normalizeAirportInfo(data, fallbackIcao) {
        if (!data || typeof data !== "object") return null;

      function showSuggestions(query) {

          return '<svg class="wind-barb" viewBox="0 0 66 66" aria-hidden="true"><circle cx="33" cy="33" r="6.5" fill="none" stroke="currentColor" stroke-width="2"></circle></svg>';
        }
        const speed = Math.round(speedKt / 5) * 5;
        const pennants = Math.floor(speed / 50);
        const rem = speed - pennants * 50;
        const full = Math.floor(rem / 10);
        const half = Math.floor((rem % 10) / 5);
        const top = 8, barbDx = 12, barbDy = -6, step = 5;
        const shapes = ['<line x1="33" y1="33" x2="33" y2="' + top + '"></line>'];
        let y = top;
        for (let i = 0; i < pennants; i++) {
          shapes.push('<polygon points="33,' + y + ' 33,' + (y + 9) + ' ' + (33 + barbDx) + ',' + y + '" fill="currentColor" stroke="currentColor" stroke-linejoin="round"></polygon>');
          y += 10;
        }
        if (pennants && (full || half)) y += 1.5;
        for (let i = 0; i < full; i++) {
          shapes.push('<line x1="33" y1="' + y + '" x2="' + (33 + barbDx) + '" y2="' + (y + barbDy) + '"></line>');
          y += step;
        }
        if (half) {
          if (full === 0 && pennants === 0) y += step;
          shapes.push('<line x1="33" y1="' + y + '" x2="' + (33 + barbDx / 2) + '" y2="' + (y + barbDy / 2) + '"></line>');
        }
        return '<svg class="wind-barb" viewBox="0 0 66 66" aria-hidden="true"><g transform="rotate(' + Math.round(dir) + ' 33 33)" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">' + shapes.join("") + '</g></svg>';
      }
      function esc(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[char]));
      }
      function escJs(value) {
        return String(value).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
      }
      render();
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
      }
    </script>
